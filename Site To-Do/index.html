<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>To‑Do App Moderno</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>To‑Do App</h1>
      <p>Organiza o teu dia de forma simples.</p>
    </header>

    <form id="task-form">
      <input
        type="text"
        id="task-input"
        placeholder="Escreve uma tarefa..."
        autocomplete="off"
      />
      <button type="submit">Adicionar</button>
    </form>

    <div class="filters">
      <button data-filter="all" class="active">Todas</button>
      <button data-filter="active">Ativas</button>
      <button data-filter="done">Concluídas</button>
    </div>

    <ul id="task-list"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
