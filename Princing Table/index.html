<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Pricing Table</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1 class="title">Planos & Preços</h1>

  <div class="pricing-container">

    <div class="card">
      <h2>Starter</h2>
      <p class="price">€0</p>
      <ul>
        <li>1 Projeto</li>
        <li>Suporte Básico</li>
        <li>Recursos Limitados</li>
      </ul>
      <button>Começar</button>
    </div>

    <div class="card featured">
      <h2>Pro</h2>
      <p class="price">€12/mês</p>
      <ul>
        <li>Projetos Ilimitados</li>
        <li>Suporte Prioritário</li>
        <li>Ferramentas Avançadas</li>
      </ul>
      <button class="featured-btn">Assinar</button>
    </div>

    <div class="card">
      <h2>Enterprise</h2>
      <p class="price">€49/mês</p>
      <ul>
        <li>Equipa Completa</li>
        <li>Suporte 24/7</li>
        <li>Integrações Premium</li>
      </ul>
      <button>Contactar</button>
    </div>

  </div>

</body>
</html>
